{% extends 'base.html' %}

{% block content %}

    <style>
  .schedule-container {
    display: grid;
    /* 1 мамыча убакыт үчүн + 5 мамыча күндөр үчүн */
    grid-template-columns: 100px repeat(5, 1fr);
    grid-template-rows: auto repeat(5, 80px);
    gap: 10px;
    font-family: sans-serif;
  }

  .day-header {
    background: #f4f7f9;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    border-bottom: 2px solid #ddd;
  }

  .time-slot {
    font-size: 12px;
    color: #666;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid #eee;
  }

  .doctor-card {
    border-radius: 8px;
    padding: 10px;
    color: white;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .doctor-card img {
    border-radius: 50%;
    margin-bottom: 8px;
    border: 3px solid rgba(255,255,255,0.3);
  }

  .blue { background-color: #3498db; }
  .red { background-color: #e74c3c; }

  .name { font-size: 14px; font-weight: bold; }
  .spec { font-size: 11px; opacity: 0.8; }
</style>



    <div class="schedule-container">
  <div class="day-header">Убакыт</div>
  <div class="day-header">Дүйшөмбү</div>
  <div class="day-header">Шейшемби</div>
  <div class="day-header">Шаршемби</div>
  <div class="day-header">Бейшемби</div>
  <div class="day-header">Жума</div>

  <div class="time-slot">08:00 - 09:00</div>

  <div class="doctor-card blue" style="grid-row: 2 / 5; grid-column: 2;">
    <img src="https://via.placeholder.com/60" alt="Doctor">
    <div class="name">Др. Эрик Снайдер</div>
    <div class="spec">MRI Технолог</div>
  </div>

  <div class="time-slot">09:00 - 10:00</div>
  <div class="time-slot">10:00 - 11:00</div>

  <div class="doctor-card red" style="grid-row: 2 / 6; grid-column: 3;">
    <img src="https://via.placeholder.com/60" alt="Doctor">
    <div class="name">Др. Жейн Фоулер</div>
    <div class="spec">Лаборант</div>
  </div>
</div>




{% endblock %}
